<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Track Builder</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <h1>Car Track Builder</h1>
    </header>
<main>
    <section id="menuScreen">
        <h2>Menu</h2>
        <button id="newMapBtn">Nová mapa</button>
        <div>
            <select id="savedMapsSelect">
                <option value="">-- Vyber mapu --</option>
            </select>
            <button id="loadMapBtn">Načíst mapu</button>
        </div>
    </section>
    <section id="editorScreen" class="hidden">
        <button id="backToMenuBtn">Zpět do menu</button>
        <div id="gridParent" class="grid"></div>
        <div class="editorBar">
            <input id="mapNameInput" type="text" placeholder="Název mapy">
            <button id="saveMapBtn">Uložit mapu</button>
        </div>
        <button id="exportMapBtn">Export mapy</button>
        <textarea id="exportOutput" rows="10" cols="50" readonly></textarea>
    </section>
</main>
    <footer>
        <p>&copy;2026 Vojtěch Novotný</p>
    </footer>
    <script type="module" src="./src/script.js"></script>
</body>
</html>
